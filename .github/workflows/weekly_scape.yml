name: Volvo Price Scraper

on:
  schedule:
    # This runs at 00:00 every Sunday (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages(c("tidyverse", "rvest", "chromote"))'

      - name: Run scraper
        run: Rscript VolvoScraper.r

      - name: Commit and Push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/volvo_price_tracker.csv
          git commit -m "Weekly data update: $(date)" || echo "No changes to commit"
          git push
